name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-plugin:
    name: Validate Plugin Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Check marketplace.json
        run: |
          echo "Checking .claude-plugin/marketplace.json..."
          node -e "
            const m = JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8'));
            if (!m.name) { console.error('Missing marketplace name'); process.exit(1); }
            if (!m.plugins || !m.plugins.length) { console.error('No plugins defined'); process.exit(1); }
            m.plugins.forEach(p => {
              if (!p.name || !p.source) { console.error('Plugin missing name or source:', p); process.exit(1); }
            });
            console.log('marketplace.json OK:', m.name, '(' + m.plugins.length + ' plugins)');
          "

      - name: Check plugin.json
        run: |
          echo "Checking bettercallclaude/.claude-plugin/plugin.json..."
          node -e "
            const p = JSON.parse(require('fs').readFileSync('bettercallclaude/.claude-plugin/plugin.json','utf8'));
            const required = ['name','description','version','author'];
            const missing = required.filter(f => !p[f]);
            if (missing.length) { console.error('Missing fields:', missing); process.exit(1); }
            console.log('plugin.json OK:', p.name, 'v' + p.version);
          "

      - name: Check plugin subdirectory contents
        run: |
          for dir in agents commands skills hooks mcp-servers scripts; do
            target="bettercallclaude/$dir"
            if [ ! -d "$target" ]; then
              echo "FAIL: $target directory missing"
              exit 1
            fi
            echo "OK: $target/"
          done
          if [ ! -f "bettercallclaude/.mcp.json" ]; then
            echo "FAIL: bettercallclaude/.mcp.json missing"
            exit 1
          fi
          echo "OK: bettercallclaude/.mcp.json"

      - name: Check compiled bundles exist
        run: |
          # Only ollama runs locally via STDIO and needs a dist file.
          # HTTP servers (entscheidsuche, bge-search, fedlex-sparql, legal-citations,
          # onlinekommentar, legal-persona, tas-jurisprudence) run remotely at
          # mcp.bettercallclaude.ch -- their source lives in the BetterCallClaudeMCP
          # repo and no dist files are committed here.
          if [ ! -f "bettercallclaude/mcp-servers/ollama/dist/index.js" ]; then
            echo "FAIL: Missing bettercallclaude/mcp-servers/ollama/dist/index.js"
            exit 1
          fi
          echo "OK: bettercallclaude/mcp-servers/ollama/dist/index.js"

      - name: Check .mcp.json
        run: |
          node -e "
            const m = JSON.parse(require('fs').readFileSync('bettercallclaude/.mcp.json','utf8'));
            if (!m.mcpServers) { console.error('Missing mcpServers'); process.exit(1); }
            const servers = Object.keys(m.mcpServers);
            console.log('MCP servers configured:', servers.length);
            servers.forEach(s => console.log(' -', s));
          "

      - name: Check skill frontmatter
        run: |
          for skill_dir in bettercallclaude/skills/*/; do
            skill_file="${skill_dir}SKILL.md"
            if [ ! -f "$skill_file" ]; then
              echo "FAIL: Missing $skill_file"
              exit 1
            fi
            if ! head -1 "$skill_file" | grep -q "^---"; then
              echo "FAIL: $skill_file missing YAML frontmatter"
              exit 1
            fi
            echo "OK: $skill_file"
          done

      - name: Package plugin (dry check)
        run: bash scripts/package-plugin.sh
